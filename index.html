<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Camera App</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      touch-action: manipulation; /* Prevent double-tap zoom on mobile */
    }
    #media-container {
      width: 100%;
      max-width: 500px;
      min-height: 350px;
      background-color: #212529;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    #video-feed, #captured-image {
      width: 100%;
      height: auto;
      object-fit: cover;
    }
    .overlay-text {
      position: absolute;
      bottom: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      pointer-events: none; /* Let clicks pass through to the video */
    }
  </style>
</head>
<body>

  <div class="container py-5 text-center">
    <h2 class="mb-4">Snap & Save to Drive</h2>
    
    <!-- Top Button: Start/Stop/Retake Camera -->
    <button id="toggle-cam-btn" class="btn btn-primary btn-lg mb-4 shadow-sm px-4">
      <i class="bi bi-camera-video"></i> Start Camera
    </button>

    <!-- Camera View & Image Preview Area -->
    <div id="media-container" class="mx-auto mb-4">
      <!-- Video Element for live camera feed (playsinline is crucial for iOS) -->
      <video id="video-feed" class="d-none" autoplay playsinline></video>
      
      <!-- Image Element to show the captured picture -->
      <img id="captured-image" class="d-none" alt="Captured view" />
      
      <!-- Instructional Overlay -->
      <div id="instruction-overlay" class="overlay-text d-none">
        Tap screen to capture
      </div>
    </div>

    <!-- Bottom Button: Save to Google Drive -->
    <button id="save-btn" class="btn btn-success btn-lg shadow-sm px-4 d-none">
      <span id="save-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
      Save to Google Drive
    </button>

    <!-- Status Alerts -->
    <div id="status-alert" class="alert mt-4 mx-auto d-none" style="max-width: 500px;" role="alert"></div>
  </div>

  <script>
    // --- DOM Elements ---
    const video = document.getElementById('video-feed');
    const img = document.getElementById('captured-image');
    const toggleBtn = document.getElementById('toggle-cam-btn');
    const saveBtn = document.getElementById('save-btn');
    const instructionOverlay = document.getElementById('instruction-overlay');
    const alertBox = document.getElementById('status-alert');
    const saveSpinner = document.getElementById('save-spinner');

    // --- State Variables ---
    let stream = null;
    let capturedDataUrl = null;

    // --- Event Listeners ---
    toggleBtn.addEventListener('click', () => {
      if (stream) {
        stopCamera();
        // If we manually stop, reset the view entirely
        img.classList.add('d-none');
        saveBtn.classList.add('d-none');
        capturedDataUrl = null;
      } else {
        startCamera();
      }
    });

    // Clicking the video triggers the photo capture
    video.addEventListener('click', capturePicture);

    // Clicking save triggers the GAS API
    saveBtn.addEventListener('click', saveToDrive);


    // --- Core Functions ---

    async function startCamera() {
      hideAlert();
      try {
        // Request the rear camera using facingMode: 'environment'
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        
        video.srcObject = stream;
        
        // Update UI for live feed
        video.classList.remove('d-none');
        img.classList.add('d-none');
        instructionOverlay.classList.remove('d-none');
        saveBtn.classList.add('d-none');
        
        // Update Toggle Button
        toggleBtn.textContent = 'Stop Camera';
        toggleBtn.classList.replace('btn-primary', 'btn-danger');
        toggleBtn.classList.replace('btn-secondary', 'btn-danger');
        
        capturedDataUrl = null; // Clear previous capture
      } catch (err) {
        console.error("Camera access error:", err);
        showAlert('Error accessing camera. Please ensure permissions are granted.', 'danger');
      }
    }

    function stopCamera() {
      if (stream) {
        // Stop all video tracks to turn off the hardware camera light
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      
      // Update UI
      video.classList.add('d-none');
      instructionOverlay.classList.add('d-none');
      
      toggleBtn.textContent = 'Start Camera';
      toggleBtn.classList.remove('btn-danger');
      toggleBtn.classList.add(capturedDataUrl ? 'btn-secondary' : 'btn-primary');
      if(capturedDataUrl) {
          toggleBtn.textContent = 'Retake Picture';
      }
    }

    function capturePicture() {
      if (!stream) return;

      // Create a hidden canvas to draw the current video frame
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Convert canvas to base64 JPEG
      capturedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
      
      // Show the image and hide the video
      img.src = capturedDataUrl;
      img.classList.remove('d-none');
      
      // Stop the live feed and show the save button
      stopCamera();
      saveBtn.classList.remove('d-none');
    }

    function saveToDrive() {
      if (!capturedDataUrl) return;

      // 1. Prepare the data (remove the "data:image/jpeg;base64," prefix)
      const base64Data = capturedDataUrl.split(',')[1];
      const filename = 'Photo_' + new Date().toISOString().replace(/[:.]/g, '-') + '.jpg';

      // 2. Set UI to loading state
      saveBtn.disabled = true;
      saveSpinner.classList.remove('d-none');
      hideAlert();

      // 3. Call Google Apps Script backend
      // We check if google.script.run exists so it doesn't crash if previewed outside GAS
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(fileUrl) {
            showAlert('Success! Picture saved to Drive.', 'success');
            resetSaveButton();
            // Optional: You could add a link to the fileUrl here
          })
          .withFailureHandler(function(error) {
            showAlert('Failed to save picture: ' + error.message, 'danger');
            resetSaveButton();
          })
          .saveImageToDrive(base64Data, filename);
      } else {
        // Mock behavior for local testing / outside of GAS
        setTimeout(() => {
          showAlert('Mock Success: Image would be saved to Drive via google.script.run in a real Apps Script environment.', 'success');
          resetSaveButton();
        }, 1500);
      }
    }

    // --- Utility Functions ---

    function resetSaveButton() {
      saveBtn.disabled = false;
      saveSpinner.classList.add('d-none');
    }

    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert mt-4 mx-auto alert-${type}`;
      alertBox.classList.remove('d-none');
    }

    function hideAlert() {
      alertBox.classList.add('d-none');
    }
  </script>
</body>
</html>
